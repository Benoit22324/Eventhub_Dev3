name: Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    uses: ./.github/workflows/testUnit.yml
    secrets: inherit

#   build:
#     runs-on: ubuntu-latest
#     steps:
#       - name: Checkout code
#         uses: actions/checkout@v4

#       - name: Build backend Docker image
#         run: docker build -t eventhub-backend ./Eventhub

#       - name: Build frontend Docker image
#         run: docker build -t eventhub-frontend ./EventhubFront

  deploy:
    if: github.event_name == 'push'
    needs: [unit-tests]
    runs-on: ubuntu-latest

    environment: workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test SSH port
        run: |
          nc -zv ${{ secrets.VPS_HOST }} 22

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}

            if [ ! -d "eventhub" ]; then
              git clone git@github.com:Benoit22324/Eventhub_Dev3.git eventhub
            fi

            cd eventhub
            git pull origin main

            cat <<EOF > Eventhub/.env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            POSTGRES_USER=${{ secrets.DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            POSTGRES_DB=${{ secrets.DB_NAME }}
            DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/${{ secrets.DB_NAME }}
            EOF

            docker compose down
            docker compose build
            docker compose run --rm migrate
            docker compose up -d

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Le déploiement a échoué !"