services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - app-network

  frontend:
    build: ./EventhubFront
    container_name: frontend
    expose:
      - 80
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started

  backend:
    build: ./Eventhub
    container_name: backend
    env_file:                       # Charger les variables depuis un fichier
      - ./Eventhub/.env
    expose:
      - 8000
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:                     # Attendre que la BDD soit prete
        condition: service_healthy
      # migrate:                     # Attendre que les migrations soient terminees
      #   condition: service_completed_successfully
    networks:
      - app-network

  # migrate:
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:                      # Monter le code backend dans le conteneur
  #     - ./Eventhub:/app
  #   env_file:
  #     - ./Eventhub/.env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command: sh -c "npx prisma migrate deploy"
  #   networks:
  #     - app-network

  postgres:
    image: postgres:15
    container_name: eventhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d password"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  mongo:
    image: mongo:latest
    container_name: eventhub_mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: eventhub_redis
    restart: always
    ports:
      - '6379:6379'
    networks:
      - app-network

volumes:
  mongo_data:
  pgdata:

networks:                           # Declaration du reseau
  app-network:
    driver: bridge